<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Cita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/formulario.css}" rel="stylesheet">
</head>
<body>

<div class="medical-container">
  <div class="form-card-wide">
    <div class="form-visual-header">
      <div class="d-flex justify-content-center align-items-center">
        <span style="font-size: 3.5rem;" class="me-4">📑</span>
        <div class="text-start">
          <h2 class="mb-1 text-white fw-bold">Programar Nueva Consulta</h2>
          <p class="mb-0 opacity-75">Registro oficial de pacientes y asignación médica</p>
        </div>
      </div>
    </div>

    <div class="form-body-spacing">
      <div th:if="${error}" class="alert-info" style="border-left-color: #ef4444; background: #fef2f2; color: #991b1b; margin-bottom: 30px;">
        <strong class="d-block">⚠️ Error en el registro</strong>
        <span th:text="${error}"></span>
      </div>

      <form th:action="@{/consultas/registrar}" th:object="${consulta}" method="post" class="grid-form">

        <div class="full-width">
          <label class="form-label">Nombre del Paciente</label>
          <input type="text"
                 th:field="*{paciente}"
                 class="form-control"
                 placeholder="Ingrese el nombre completo (solo letras)"
                 required
                 minlength="3"
                 maxlength="50"
                 pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$"
                 oninvalid="this.setCustomValidity('El nombre no debe contener números ni caracteres especiales')"
                 oninput="this.setCustomValidity('')">
          <div class="input-helper">Solo se permiten letras, tildes y espacios (3-50 caracteres).</div>
        </div>

        <div>
          <label class="form-label">Especialidad</label>
          <input type="text" th:field="*{especialidad}" class="form-control"
                 placeholder="Ej. Cardiología" required>
        </div>

        <div>
          <label class="form-label">Especialista Asignado</label>
          <select th:field="*{medico}" class="form-control" required>
            <option value="" selected disabled>Seleccione un especialista...</option>

            <optgroup label="Medicina General y Primaria">
              <option value="Dr. Smith">Dr. Smith (Medicina General)</option>
              <option value="Dra. Garcia">Dra. Garcia (Pediatría)</option>
              <option value="Dra. Miller">Dra. Miller (Geriatría)</option>
              <option value="Dr. Lopez">Dr. Lopez (Ginecología)</option>
            </optgroup>

            <optgroup label="Especialidades Clínicas y Quirúrgicas">
              <option value="Dr. Ross">Dr. Ross (Cardiología)</option>
              <option value="Dr. Brown">Dr. Brown (Traumatología)</option>
              <option value="Dra. Wilson">Dra. Wilson (Oncología)</option>
              <option value="Dr. Strange">Dr. Strange (Neurocirugía)</option>
              <option value="Dra. Quinn">Dra. Quinn (Psiquiatría)</option>
              <option value="Dr. House">Dr. House (Infectología)</option>
              <option value="Dra. Grey">Dra. Grey (Cirugía General)</option>
              <option value="Dr. Murphy">Dr. Murphy (Urología)</option>
              <option value="Dra. Foster">Dra. Foster (Dermatología)</option>
            </optgroup>

            <optgroup label="🚨 Guardia de Emergencias (24h)">
              <option value="Emergencias - General">Unidad de Shock Trauma (Médico de Guardia)</option>
              <option value="Emergencias - Pediatría">Guardia Pediátrica de Emergencia</option>
              <option value="Emergencias - Traumatología">Traumatólogo de Emergencia</option>
              <option value="Emergencias - Cardiología">Unidad Coronaria de Emergencia</option>
            </optgroup>
          </select>
        </div>

        <div class="full-width">
          <label class="form-label">Fecha y Hora de la Cita</label>
          <input type="datetime-local" th:field="*{fechaHora}" class="form-control" required>

          <div class="alert-info mt-4">
            <strong>ℹ️ Guía de Horarios:</strong><br>
            Consultas externas: 06:00 a 18:00.<br>
            Para citas nocturnas, asigne exclusivamente al médico de <strong>Emergencias</strong>.
          </div>
        </div>

        <div class="full-width d-flex gap-3 mt-3">
          <button type="submit" class="btn-medical w-100">
            Confirmar y Agendar Cita
          </button>
          <a th:href="@{/consultas}" class="btn-light px-4 text-decoration-none" style="min-width: 150px;">
            Volver
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
